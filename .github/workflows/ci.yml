name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/constraints.txt
            backend/constraints-dev.txt
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -c constraints-dev.txt -r requirements-dev.txt
      - name: Run backend tests
        run: python -m pytest tests -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Supply non-secret Compose defaults
        run: cp .env.example .env
      - name: Validate default stack
        run: docker compose config --quiet
      - name: Validate development overlay
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet
      - name: Validate GPU overlay
        run: docker compose -f docker-compose.yml -f docker-compose.gpu.yml config --quiet
