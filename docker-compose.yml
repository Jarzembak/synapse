services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - LIBRARY_DIR=/data/library
      - MEDIA_DIR=/data/media
      - DB_PATH=/data/db/vst.sqlite3
      - LOG_DIR=/data/logs
      - LOG_NAME=api
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/library:/data/library
      - ./data/media:/data/media
      - ./data/db:/data/db
      - ./data/logs:/data/logs
      - ${HOST_MEDIA_DIR:-./data/media}:/host-media:ro
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./backend
    # concurrency 4: run-all's orchestrator occupies one slot while the
    # parallel branches (e.g. both deep dives) run in the others
    command: celery -A app.tasks.celery_app.celery worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - LIBRARY_DIR=/data/library
      - MEDIA_DIR=/data/media
      - DB_PATH=/data/db/vst.sqlite3
      - LOG_DIR=/data/logs
      - LOG_NAME=worker
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data/library:/data/library
      - ./data/media:/data/media
      - ./data/db:/data/db
      - ./data/logs:/data/logs
      - whisper-models:/root/.cache/huggingface
      - ${HOST_MEDIA_DIR:-./data/media}:/host-media:ro
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama-models:
  whisper-models:
