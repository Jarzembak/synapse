server {
    listen 80;
    client_max_body_size 200m;

    # Docker's embedded DNS; re-resolve so an api container restart doesn't
    # leave nginx proxying to a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api;

    location /api/ {
        # variable form forces per-request resolution; original URI passes through
        proxy_pass http://$api_upstream:8000;
        proxy_read_timeout 3600s;
        proxy_buffering off;          # required for SSE
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
