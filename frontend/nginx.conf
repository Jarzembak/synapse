server {
    listen 80;
    client_max_body_size 20g;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Docker's embedded DNS; re-resolve so an api container restart doesn't
    # leave nginx proxying to a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api;

    location /api/ {
        # variable form forces per-request resolution; original URI passes through
        proxy_pass http://$api_upstream:8000;
        proxy_read_timeout 3600s;
        proxy_buffering off;          # required for SSE
        proxy_request_buffering off;  # stream large browser uploads to FastAPI
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
